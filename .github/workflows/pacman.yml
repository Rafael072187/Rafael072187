name: Deploy Pacman Game (final)

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Limpar diretórios antigos
        run: rm -rf pacman-generator dist || true

      - name: Clonar gerador Pacman
        run: git clone https://github.com/abozanona/pacman-contribution-graph pacman-generator

      - name: Instalar dependências e compilar
        run: |
          cd pacman-generator
          npm install --legacy-peer-deps
          npm run build
          cd ..

      - name: Gerar SVGs via CLI (modo compatível)
        run: |
          mkdir -p dist
          cd pacman-generator
          node ./src/cli.js Rafael072187 --width 900 --height 180 --theme light > ../dist/pacman-contribution-graph.svg
          node ./src/cli.js Rafael072187 --width 900 --height 180 --theme dark > ../dist/pacman-contribution-graph-dark.svg
          cd ..

      - name: Verificar arquivos gerados
        run: |
          echo "Arquivos gerados:"
          ls -lh dist || echo "⚠️ Nenhum SVG encontrado"
          head -n 10 dist/pacman-contribution-graph.svg || true

      - name: Publicar SVGs na branch output
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
