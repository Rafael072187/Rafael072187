name: Deploy Pacman Game (estável)

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Limpar diretórios antigos
        run: rm -rf pacman-generator dist || true

      - name: Clonar gerador Pacman
        run: git clone https://github.com/abozanona/pacman-contribution-graph pacman-generator

      - name: Instalar dependências e compilar
        run: |
          cd pacman-generator
          npm ci
          npm run build
          cd ..

      - name: Gerar SVGs do Pacman (estável)
        run: |
          mkdir -p dist
          cd pacman-generator
          node --input-type=module -e "
            import fs from 'fs';
            import pkg from './dist/pacman-contribution-graph.min.js';
            const { generate } = pkg;
            const opts = { width: 900, height: 180, theme: 'light' };
            const light = generate('Rafael072187', opts);
            const dark = generate('Rafael072187', { ...opts, theme: 'dark' });
            fs.writeFileSync('../dist/pacman-contribution-graph.svg', light);
            fs.writeFileSync('../dist/pacman-contribution-graph-dark.svg', dark);
          "
          cd ..

      - name: Verificar arquivos gerados
        run: |
          echo "Arquivos gerados:"
          ls -lh dist
          echo "Preview SVG:"
          head -n 10 dist/pacman-contribution-graph.svg || true

      - name: Publicar SVGs na branch output
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
