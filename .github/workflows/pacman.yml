name: Deploy Pacman Game (final)

on:
  schedule:
    - cron: "0 */12 * * *" # roda a cada 12h
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Gerar Pacman SVGs (action oficial)
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Rafael072187
          width: 900
          height: 180
          theme_name: default

      - name: Criar pasta dist e mover SVGs
        run: |
          mkdir -p dist
          mv pacman-contribution-graph.svg dist/ || true
          mv pacman-contribution-graph-dark.svg dist/ || true
          echo "Arquivos prontos:"
          ls -lh dist

      - name: Publicar na branch output
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
